# .github/workflows/selenium-ci.yml
name: Selenium Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      intentional_fail:
        description: "Run intentional failing assertion to generate red log"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  run-tests-green-default:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Testing B11/Testing B9/Bt1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: Testing B11/Testing B9/Bt1/pom.xml

      - name: Chạy Selenium Tests
        run: mvn clean test -Dbrowser=chrome -Denv=dev -DintentionalFail=false
        env:
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
          CI: true

      - name: Lưu kết quả test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-green
          path: |
            Testing B11/Testing B9/Bt1/target/surefire-reports/
            Testing B11/Testing B9/Bt1/target/screenshots/
          retention-days: 30

  run-tests-intentional-red:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.intentional_fail == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Testing B11/Testing B9/Bt1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: Testing B11/Testing B9/Bt1/pom.xml

      - name: Chạy Selenium Tests (intentional fail)
        run: mvn clean test -Dbrowser=chrome -Denv=dev -DintentionalFail=true
        env:
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
          CI: true

      - name: Lưu kết quả test fail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-red
          path: |
            Testing B11/Testing B9/Bt1/target/surefire-reports/
            Testing B11/Testing B9/Bt1/target/screenshots/
          retention-days: 30